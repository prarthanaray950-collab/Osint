<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — IntelGrid</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080C17;--bg2:#0C1120;--border:#1A2540;--border2:#243050;--accent:#3B82F6;--accent2:#06B6D4;--green:#10B981;--red:#EF4444;--text:#E8EDF5;--muted:#566A8A;--muted2:#8A9BB5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(26,37,64,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(26,37,64,0.3) 1px,transparent 1px);background-size:48px 48px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:44px 36px;max-width:400px;width:100%;animation:fadeUp 0.5s ease;box-shadow:0 24px 80px rgba(0,0,0,0.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:36px;justify-content:center}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:500;color:#fff;box-shadow:0 0 14px rgba(59,130,246,0.3)}
.logo-text{font-size:1rem;font-weight:800;letter-spacing:2px}
h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;text-align:center;letter-spacing:-0.01em}
.sub{font-size:0.82rem;color:var(--muted2);text-align:center;margin-bottom:28px;line-height:1.65}

/* Perks row */
.perks{display:flex;justify-content:center;gap:20px;margin-bottom:30px;flex-wrap:wrap}
.perk{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--muted2)}
.perk-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Google button */
.btn-google{width:100%;height:52px;background:#fff;color:#1f1f1f;border:1px solid #dadce0;border-radius:12px;font-family:'Syne',sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.2s;position:relative}
.btn-google:hover{background:#f8f9fa;box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(-1px)}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-google .g-icon{flex-shrink:0;width:20px;height:20px}
.btn-google .btn-text{flex:1;text-align:center}
.btn-spinner{width:18px;height:18px;border:2px solid #dadce0;border-top-color:#4285F4;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.terms{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:16px;line-height:1.65}
.terms a{color:var(--accent);text-decoration:none}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#FCA5A5;padding:11px 14px;font-size:0.82rem;margin-top:14px;display:none;border-left:3px solid var(--red);line-height:1.5}
.divider{display:flex;align-items:center;gap:10px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;white-space:nowrap}
.links{display:flex;justify-content:center;font-size:0.8rem;color:var(--muted);gap:6px}
.links a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">IG</div>
    <span class="logo-text">INTELGRID</span>
  </a>

  <h1>Create Account</h1>
  <p class="sub">Join IntelGrid — start searching in seconds</p>

  <div class="perks">
    <div class="perk"><div class="perk-dot"></div>5 free credits</div>
    <div class="perk"><div class="perk-dot"></div>No card needed</div>
    <div class="perk"><div class="perk-dot"></div>14 search modules</div>
  </div>

  <button class="btn-google" id="googleBtn" onclick="googleSignIn()">
    <svg class="g-icon" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    <span class="btn-text">Sign up with Google</span>
  </button>

  <p class="terms">By signing up you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.</p>
  <div class="err" id="err"></div>

  <div class="divider"><span>already have an account?</span></div>
  <div class="links"><a href="login.html">← Sign in instead</a></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const API = '';
const GOOGLE_CLIENT_ID = '820086258635-ir6s0i0ms2pm55g0h0jm2pkf2cr21r9r.apps.googleusercontent.com';

// Redirect already-logged-in users — only if both token AND user data exist
(function() {
  const token = localStorage.getItem('intelToken');
  const user  = localStorage.getItem('intelUser');
  if (token && user) {
    try {
      const u = JSON.parse(user);
      window.location.replace(u.role === 'admin' ? 'admin.html' : 'dashboard.html');
    } catch(e) {
      localStorage.removeItem('intelToken');
      localStorage.removeItem('intelUser');
    }
  }
})();

// Pre-fill referral code from URL ?ref=XXXXX
const refParam = new URLSearchParams(location.search).get('ref');

// Guard: prevent handleGoogleCredential from firing more than once per page load
let _googleSignInHandled = false;

function initGoogle() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
    cancel_on_tap_outside: true,
  });
}

if (typeof google !== 'undefined') initGoogle();
else document.querySelector('script[src*="gsi"]').addEventListener('load', initGoogle);

const G_SVG = `<svg class="g-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

function setLoading(on) {
  const btn = document.getElementById('googleBtn');
  btn.disabled = on;
  btn.innerHTML = on
    ? `<div class="btn-spinner"></div><span class="btn-text">Creating account…</span>`
    : G_SVG + `<span class="btn-text">Sign up with Google</span>`;
}

function googleSignIn() {
  if (typeof google === 'undefined') { showErr('Google Sign-In script failed to load.'); return; }
  hideErr();
  // Reset guard on each fresh button click
  _googleSignInHandled = false;
  google.accounts.id.prompt(notification => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      google.accounts.id.renderButton(document.getElementById('googleBtn'), {
        theme: 'outline', size: 'large', width: 328,
      });
      document.getElementById('googleBtn').querySelector('div[role="button"]')?.click();
    }
  });
}

async function handleGoogleCredential(response) {
  // Prevent double-invocation (One Tap + renderButton can both resolve)
  if (_googleSignInHandled) return;
  _googleSignInHandled = true;

  setLoading(true);
  hideErr();
  try {
    const r = await fetch(API + '/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential, referralCode: refParam || null }),
    });
    const d = await r.json();
    if (!r.ok) {
      showErr(d.message || 'Sign-up failed. Try again.');
      setLoading(false);
      _googleSignInHandled = false; // Allow retry on error
      return;
    }
    localStorage.setItem('intelToken', d.token);
    localStorage.setItem('intelUser', JSON.stringify(d.user));
    window.location.replace('dashboard.html');
  } catch(e) {
    showErr('Network error. Please try again.');
    setLoading(false);
    _googleSignInHandled = false; // Allow retry on error
  }
}

function showErr(msg) { const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block'; }
function hideErr()    { document.getElementById('err').style.display = 'none'; }
</script>
</body>
</html>
