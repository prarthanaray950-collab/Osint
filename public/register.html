<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — IntelGrid</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080C17;--bg2:#0C1120;--border:#1A2540;--border2:#243050;--accent:#3B82F6;--accent2:#06B6D4;--green:#10B981;--red:#EF4444;--text:#E8EDF5;--muted:#566A8A;--muted2:#8A9BB5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(26,37,64,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(26,37,64,0.3) 1px,transparent 1px);background-size:48px 48px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px 36px;max-width:420px;width:100%;animation:fadeUp 0.5s ease;box-shadow:0 24px 80px rgba(0,0,0,0.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px;justify-content:center}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.65rem;color:white}
.logo-text{font-size:1rem;font-weight:700;letter-spacing:1.5px}
h1{font-size:1.5rem;font-weight:800;margin-bottom:6px;text-align:center;letter-spacing:-0.01em}
.sub{font-size:0.82rem;color:var(--muted2);text-align:center;margin-bottom:32px;line-height:1.6}

.btn-google{width:100%;height:48px;background:white;color:#1f1f1f;border:1px solid #dadce0;border-radius:10px;font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s}
.btn-google:hover{background:#f8f9fa;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.btn-google.loading{opacity:0.6;cursor:not-allowed;pointer-events:none}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}

.field{margin-bottom:14px}
.field label{display:block;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;height:44px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:0 14px;font-family:'Syne',sans-serif;font-size:0.875rem;color:var(--text);outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.field input::placeholder{color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.9rem;padding:4px}
.strength{height:3px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
.strength-bar{height:100%;border-radius:2px;transition:all 0.3s;width:0}

.ref-box{background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.15);border-radius:8px;padding:12px;margin-bottom:14px}
.ref-box label{display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.ref-box input{width:100%;height:36px;background:transparent;border:1px solid rgba(59,130,246,0.2);border-radius:6px;padding:0 12px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--text);outline:none;text-transform:uppercase}
.ref-box input:focus{border-color:var(--accent)}

.btn-primary{width:100%;height:46px;background:linear-gradient(135deg,var(--accent),#2563EB);color:white;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:0.875rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}

.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:7px;color:#FCA5A5;padding:10px 14px;font-size:0.82rem;margin-top:12px;display:none;border-left:3px solid var(--red)}
.login-link{text-align:center;font-size:0.8rem;color:var(--muted);margin-top:20px}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">IG</div>
    <span class="logo-text">INTELGRID</span>
  </a>
  <h1>Create Account</h1>
  <p class="sub">5 free credits on signup. No card required.</p>

  <!-- Google Sign Up -->
  <button class="btn-google" id="googleBtn" onclick="googleSignIn()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign up with email</span></div>

  <div class="field">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Your full name" autocomplete="name"/>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength()"/>
      <button class="eye-btn" onclick="togglePw('password',this)" type="button">👁</button>
    </div>
    <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
  </div>

  <div class="ref-box">
    <label>Referral Code (optional)</label>
    <input type="text" id="refCode" placeholder="XXXXXXXX" maxlength="8"/>
  </div>

  <button class="btn-primary" id="registerBtn" onclick="register()">Create Account</button>
  <div class="err" id="err"></div>

  <div class="login-link">Already have an account? <a href="login.html">Sign in →</a></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const API = '';
const GOOGLE_CLIENT_ID = '820086258635-ir6s0i0ms2pm55g0h0jm2pkf2cr21r9r.apps.googleusercontent.com';

window.addEventListener('load', () => {
  if (typeof google !== 'undefined') initGoogle();
  else document.querySelector('script[src*="gsi"]').addEventListener('load', initGoogle);
});

function initGoogle() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
  });
}

function googleSignIn() {
  if (typeof google === 'undefined') { showErr('Google Sign-In failed to load.'); return; }
  google.accounts.id.prompt();
}

async function handleGoogleCredential(response) {
  const btn = document.getElementById('googleBtn');
  btn.classList.add('loading');
  btn.textContent = 'Signing in...';
  try {
    const r = await fetch(API + '/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential }),
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.message); btn.classList.remove('loading'); btn.innerHTML = googleBtnHTML(); return; }
    localStorage.setItem('intelToken', d.token);
    localStorage.setItem('intelUser', JSON.stringify(d.user));
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.classList.remove('loading');
    btn.innerHTML = googleBtnHTML();
  }
}

function googleBtnHTML() {
  return `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google`;
}

async function register() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const refCode  = document.getElementById('refCode').value.trim().toUpperCase();

  if (!name || !email || !password) { showErr('All fields are required.'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('Enter a valid email address.'); return; }
  if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  hideErr();

  try {
    const r = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password, referralCode: refCode || null })
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.message); btn.disabled = false; btn.textContent = 'Create Account'; return; }
    localStorage.setItem('intelToken', d.token);
    localStorage.setItem('intelUser', JSON.stringify(d.user));
    btn.textContent = 'Welcome! Redirecting...';
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr('Network error. Check your connection.');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

function checkStrength() {
  const pw = document.getElementById('password').value;
  const bar = document.getElementById('strengthBar');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#EF4444','#F59E0B','#3B82F6','#10B981'];
  const widths  = ['25%','50%','75%','100%'];
  bar.style.width = pw.length ? widths[score-1] || '10%' : '0';
  bar.style.background = pw.length ? colors[score-1] || '#EF4444' : '';
}

function togglePw(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}
function showErr(msg) { const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block'; }
function hideErr()    { document.getElementById('err').style.display = 'none'; }

if (localStorage.getItem('intelToken')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
