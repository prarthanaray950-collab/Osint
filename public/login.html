<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — IntelGrid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0A0E1A;--bg2:#0F1629;--border:#1E2D50;--accent:#3B82F6;--accent2:#06B6D4;--green:#10B981;--red:#EF4444;--text:#E2E8F0;--muted:#64748B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:44px 40px;max-width:420px;width:100%;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px;justify-content:center}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:500;color:white}
.logo-text{font-size:1.1rem;font-weight:700;letter-spacing:1.5px}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px;text-align:center}
.sub{font-size:0.845rem;color:var(--muted);font-weight:300;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;height:46px;background:#0A0E1A;border:1px solid var(--border);border-radius:8px;padding:0 14px;font-family:'Inter',sans-serif;font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.field input::placeholder{color:var(--muted)}
.pw-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pw-row label{font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.pw-row a{font-size:0.75rem;color:var(--accent);text-decoration:none}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem}
.btn{width:100%;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:7px;color:#FCA5A5;padding:11px 14px;font-size:0.845rem;margin-top:12px;display:none;border-left:3px solid var(--red)}
.verify-link{display:none;margin-top:10px;text-align:center;font-size:0.82rem}
.verify-link a{color:var(--accent);text-decoration:none}
.links{display:flex;justify-content:space-between;margin-top:20px;font-size:0.82rem;color:var(--muted)}
.links a{color:var(--accent);text-decoration:none;font-weight:500}

/* forgot-password modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;max-width:380px;width:calc(100% - 40px);animation:fadeUp 0.3s ease}
.modal h2{font-size:1.2rem;font-weight:600;margin-bottom:8px}
.modal p{font-size:0.845rem;color:var(--muted);margin-bottom:20px;line-height:1.6}
.modal .field{margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.btn-outline{flex:1;height:42px;background:transparent;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:0.845rem;color:var(--text);cursor:pointer}
.btn-sm{flex:1;height:42px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.845rem;font-weight:500;cursor:pointer}

/* OTP row for forgot */
.otp-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.otp-input{width:42px;height:48px;background:#0A0E1A;border:1.5px solid var(--border);border-radius:8px;font-size:1.3rem;font-weight:600;text-align:center;color:var(--text);font-family:'JetBrains Mono',monospace;outline:none;transition:border-color 0.2s}
.otp-input:focus{border-color:var(--accent)}
.suc{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:7px;color:#6EE7B7;padding:11px 14px;font-size:0.845rem;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">IG</div>
    <span class="logo-text">INTELGRID</span>
  </a>
  <h1>Welcome Back</h1>
  <div class="sub">Sign in to your intelligence dashboard</div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <div class="field">
    <div class="pw-row">
      <label>Password</label>
      <a href="#" onclick="showForgot()">Forgot password?</a>
    </div>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
      <button class="eye-btn" onclick="togglePw(this)" type="button">👁</button>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
  <div class="err" id="err"></div>
  <div class="verify-link" id="verifyLink">
    Not verified yet? <a href="#" onclick="goVerify()">Verify your email</a>
  </div>

  <div class="links">
    <span>New to IntelGrid?</span>
    <a href="register.html">Create account →</a>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-bg" id="forgotModal">
  <div class="modal">
    <div id="fpStep1">
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send a 6-digit OTP to reset your password.</p>
      <div class="field"><label>Email</label><input type="email" id="fpEmail" placeholder="your@email.com"/></div>
      <div class="err" id="fpErr1"></div>
      <div class="modal-btns">
        <button class="btn-outline" onclick="hideForgot()">Cancel</button>
        <button class="btn-sm" id="fpSendBtn" onclick="fpSendOtp()">Send OTP</button>
      </div>
    </div>
    <div id="fpStep2" style="display:none">
      <h2>Enter OTP</h2>
      <p>OTP sent to <strong id="fpEmailDisplay"></strong></p>
      <div class="otp-inputs">
        <input class="otp-input" maxlength="1" id="fp1" oninput="otpMove(this,'fp2')" onkeydown="otpBack(event,this,'')"/>
        <input class="otp-input" maxlength="1" id="fp2" oninput="otpMove(this,'fp3')" onkeydown="otpBack(event,this,'fp1')"/>
        <input class="otp-input" maxlength="1" id="fp3" oninput="otpMove(this,'fp4')" onkeydown="otpBack(event,this,'fp2')"/>
        <input class="otp-input" maxlength="1" id="fp4" oninput="otpMove(this,'fp5')" onkeydown="otpBack(event,this,'fp3')"/>
        <input class="otp-input" maxlength="1" id="fp5" oninput="otpMove(this,'fp6')" onkeydown="otpBack(event,this,'fp4')"/>
        <input class="otp-input" maxlength="1" id="fp6" oninput="otpMove(this,'')" onkeydown="otpBack(event,this,'fp5')"/>
      </div>
      <div class="field"><label>New Password</label><input type="password" id="fpNewPw" placeholder="Min 6 characters"/></div>
      <div class="err" id="fpErr2"></div>
      <div class="suc" id="fpSuc"></div>
      <div class="modal-btns">
        <button class="btn-outline" onclick="hideForgot()">Cancel</button>
        <button class="btn-sm" id="fpResetBtn" onclick="fpReset()">Reset Password</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let forgotEmail = '';

async function login() {
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  if (!email || !password) { showErr('Enter email and password.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  hideErr();

  try {
    const r = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();

    if (!r.ok) {
      showErr(d.message);
      if (d.needsVerification) {
        document.getElementById('verifyLink').style.display = 'block';
        sessionStorage.setItem('unverifiedEmail', d.email);
      }
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    localStorage.setItem('intelToken', d.token);
    localStorage.setItem('intelUser', JSON.stringify(d.user));
    btn.textContent = 'Redirecting...';
    window.location.href = d.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
  } catch(e) {
    showErr('Network error. Check your connection.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function goVerify() {
  const email = sessionStorage.getItem('unverifiedEmail');
  if (email) window.location.href = `register.html?email=${encodeURIComponent(email)}`;
}

function togglePw(btn) {
  const input = btn.previousElementSibling;
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

function showErr(msg) { const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block'; }
function hideErr()    { document.getElementById('err').style.display = 'none'; }

/* Forgot password */
function showForgot() { document.getElementById('forgotModal').classList.add('show'); }
function hideForgot() { document.getElementById('forgotModal').classList.remove('show'); document.getElementById('fpStep1').style.display='block'; document.getElementById('fpStep2').style.display='none'; }

async function fpSendOtp() {
  const email = document.getElementById('fpEmail').value.trim().toLowerCase();
  if (!email) { document.getElementById('fpErr1').textContent='Enter email'; document.getElementById('fpErr1').style.display='block'; return; }
  const btn = document.getElementById('fpSendBtn');
  btn.disabled = true; btn.textContent = 'Sending...';
  const r = await fetch(API+'/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email}) });
  const d = await r.json();
  if (!r.ok) { document.getElementById('fpErr1').textContent=d.message; document.getElementById('fpErr1').style.display='block'; btn.disabled=false; btn.textContent='Send OTP'; return; }
  forgotEmail = email;
  document.getElementById('fpEmailDisplay').textContent = email;
  document.getElementById('fpStep1').style.display='none';
  document.getElementById('fpStep2').style.display='block';
  document.getElementById('fp1').focus();
}

async function fpReset() {
  const otp = ['fp1','fp2','fp3','fp4','fp5','fp6'].map(id=>document.getElementById(id).value).join('');
  const newPassword = document.getElementById('fpNewPw').value;
  if (otp.length !== 6) { document.getElementById('fpErr2').textContent='Enter all 6 digits'; document.getElementById('fpErr2').style.display='block'; return; }
  if (newPassword.length < 6) { document.getElementById('fpErr2').textContent='Password min 6 chars'; document.getElementById('fpErr2').style.display='block'; return; }
  const btn = document.getElementById('fpResetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  const r = await fetch(API+'/api/auth/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:forgotEmail, otp, newPassword}) });
  const d = await r.json();
  if (!r.ok) { document.getElementById('fpErr2').textContent=d.message; document.getElementById('fpErr2').style.display='block'; btn.disabled=false; btn.textContent='Reset Password'; return; }
  document.getElementById('fpSuc').textContent='Password reset! You can now login.'; document.getElementById('fpSuc').style.display='block';
  setTimeout(hideForgot, 2000);
}

function otpMove(el, nextId) { if (el.value.length===1 && nextId) document.getElementById(nextId).focus(); }
function otpBack(e, el, prevId) { if (e.key==='Backspace' && !el.value && prevId) document.getElementById(prevId).focus(); }

if (localStorage.getItem('intelToken')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
